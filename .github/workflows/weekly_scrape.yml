name: Weekly Competitor Scrape

on:
  schedule:
    - cron: "0 22 * * 0"  # 每週一 06:00 台灣時間 (UTC Sunday 22:00)
  workflow_dispatch:        # 允許手動觸發

# 防止同時跑兩個造成 data.json push 衝突與 Firestore 互相覆蓋
concurrency:
  group: data-writes
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml firebase-admin google-api-python-client google-auth google-ads

      - name: Run scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GSC_SERVICE_ACCOUNT: ${{ secrets.GSC_SERVICE_ACCOUNT }}
          BRIGHTDATA_KEY: ${{ secrets.BRIGHTDATA_KEY }}
          PAGESPEED_KEY: ${{ secrets.PAGESPEED_KEY }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: python backend/scraper_static.py

      - name: Commit & push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "data: weekly scrape $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
